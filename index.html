<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📖 스터디 플래너</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* 기존 플래너의 스타일을 그대로 유지합니다 */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; padding: 10px; }
        #topbar { background: #333; color: #fff; padding: 8px; display: flex; justify-content: space-between; align-items: center; border-radius: 4px; margin-bottom: 10px; }
        .nav-buttons button { background: #555; color: #fff; border: none; padding: 6px 12px; margin-right: 5px; cursor: pointer; border-radius: 3px; font-weight: bold; }
        .nav-buttons button.active { background: #fff; color: #333; }
        
        /* 상단 버튼 영역 스타일 고정 */
        .action-buttons { display: flex; gap: 8px; align-items: center; }
        .btn-action { border: none; padding: 6px 12px; cursor: pointer; border-radius: 3px; font-weight: bold; color: #fff; display: flex; align-items: center; gap: 4px; }
        .btn-subject { background-color: #9b2c2c; }
        .btn-save { background-color: #2f855a; }
        .btn-print { background-color: #4a5568; }
        
        /* 상태 표시 배지 */
        #status-indicator { font-size: 13px; font-weight: bold; color: #fc8181; }
        #status-indicator.success { color: #68d391; }

        /* 달력 및 메모 테이블 스타일 */
        .week-selector { display: flex; gap: 5px; margin-bottom: 10px; overflow-x: auto; padding-bottom: 5px; }
        .week-selector select, .week-selector button { padding: 6px 10px; border: 1px solid #ccc; border-radius: 3px; background: #fff; font-weight: bold; cursor: pointer; white-space: nowrap; }
        .week-selector button.active { background: #333; color: #fff; }
        
        .planner-grid { display: flex; flex-direction: column; gap: 10px; background: #fff; border: 2px solid #333; border-radius: 4px; padding: 10px; }
        .days-row { display: flex; gap: 10px; overflow-x: auto; }
        .day-column { flex: 1; min-width: 180px; border: 1px solid #ccc; border-radius: 4px; background: #f9f9f9; padding: 8px; }
        .day-header { text-align: center; font-weight: bold; padding: 6px; border-radius: 3px; margin-bottom: 8px; font-size: 14px; }
        .day-header.mon { background: #ffebd8; color: #c05621; }
        .day-header.tue { background: #e6fffa; color: #1d4ed8; }
        .info-line { font-size: 12px; color: #666; margin-bottom: 6px; }
        
        .todo-list { display: flex; flex-direction: column; gap: 4px; }
        .todo-item { display: flex; align-items: center; gap: 4px; background: #fff; padding: 4px; border: 1px solid #e2e8f0; border-radius: 3px; }
        .todo-item input[type="text"] { flex: 1; border: none; font-size: 13px; outline: none; }
        .btn-del { background: none; border: none; color: #cbd5e0; cursor: pointer; font-size: 12px; }
        .btn-del:hover { color: #e53e3e; }
        .btn-add-item { background: none; border: 1px dashed #cbd5e0; color: #718096; padding: 4px; font-size: 12px; cursor: pointer; border-radius: 3px; text-align: center; margin-top: 4px; }
        
        .memo-area { margin-top: 8px; border-top: 1px dashed #ccc; padding-top: 6px; }
        .memo-area label { font-size: 12px; font-weight: bold; color: #e53e3e; display: flex; align-items: center; gap: 2px; }
        .memo-area textarea { width: 100%; height: 50px; border: 1px solid #e2e8f0; border-radius: 3px; padding: 4px; font-size: 12px; resize: none; margin-top: 2px; }

        .weekly-memo { margin-top: 10px; background: #fff; border: 2px solid #333; border-radius: 4px; padding: 10px; }
        .weekly-memo-title { font-weight: bold; font-size: 14px; background: #333; color: #fff; padding: 6px; border-radius: 3px; margin-bottom: 8px; display: flex; align-items: center; gap: 4px; }
        .weekly-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .weekly-box { border: 1px solid #ccc; border-radius: 3px; padding: 6px; }
        .weekly-box label { font-size: 12px; font-weight: bold; display: block; margin-bottom: 4px; }
        .weekly-box textarea { width: 100%; height: 60px; border: 1px solid #e2e8f0; border-radius: 3px; padding: 4px; font-size: 12px; resize: none; }
    </style>
</head>
<body>

<div id="topbar">
    <div class="nav-buttons">
        <span style="font-weight: bold; margin-right: 10px;">📖 스터디 플래너 <span id="user-title" style="font-size:12px; color:#ccc;">(유진)</span></span>
        <button class="active">📅 플래너</button>
        <button>📊 진도관리</button>
        <button>📈 성취통계</button>
    </div>
    <div class="action-buttons">
        <button class="btn-action btn-subject">📚 과목</button>
        <button class="btn-action btn-save" onclick="saveData()">💾 저장</button>
        <button class="btn-action btn-print">🖨️ 출력</button>
        <span id="status-indicator">❌ 데이터 연결 대기 중</span>
    </div>
</div>

<div class="week-selector">
    <select id="month-select" onchange="changeMonth()">
        <option value="5">5월</option>
        <option value="6">6월</option>
    </select>
    <button class="active">1주차</button>
    <button>2주차</button>
    <button>3주차</button>
    <button class="active">4주차</button>
    <button>5주차</button>
</div>

<div class="planner-grid">
    <div class="days-row">
        <div class="day-column">
            <div class="day-header mon">25 MON 월요일</div>
            <div class="info-line">공부시간(h): 3.5</div>
            <div class="todo-list" id="todo-mon">
                <div class="todo-item"><input type="checkbox"> <input type="text" value="할 일 입력..."> <button class="btn-del">×</button></div>
                <div class="todo-item"><input type="checkbox"> <input type="text" value="..."> <button class="btn-del">×</button></div>
            </div>
            <button class="btn-add-item" onclick="addTodo('mon')">+ 항목</button>
            <div class="memo-area">
                <label>📌 메모</label>
                <textarea id="memo-mon">자유 메모...</textarea>
            </div>
        </div>

        <div class="day-column">
            <div class="day-header tue">26 TUE 화요일</div>
            <div class="info-line">공부시간(h): 3.5</div>
            <div class="todo-list" id="todo-tue">
                <div class="todo-item"><input type="checkbox"> <input type="text" value="할 일 입력..."> <button class="btn-del">×</button></div>
                <div class="todo-item"><input type="checkbox"> <input type="text" value="..."> <button class="btn-del">×</button></div>
            </div>
            <button class="btn-add-item" onclick="addTodo('tue')">+ 항목</button>
            <div class="memo-area">
                <label>📌 메모</label>
                <textarea id="memo-tue">자유 메모...</textarea>
            </div>
        </div>
    </div>
</div>

<div class="weekly-memo">
    <div class="weekly-memo-title">📝 주간 메모</div>
    <div class="weekly-grid">
        <div class="weekly-box"><label>이번 주 목표</label><textarea id="week-target">입력...</textarea></div>
        <div class="weekly-box"><label>잘한 점</label><textarea id="week-good">입력...</textarea></div>
        <div class="weekly-box"><label>아쉬운 점</label><textarea id="week-bad">입력...</textarea></div>
        <div class="weekly-box"><label>다음 주 준비</label><textarea id="week-next">입력...</textarea></div>
    </div>
</div>

<script>
    // Supabase 접속 정보 설정 완벽 적용
    const SB_URL = "https://gbjlroojsweedundumfi.supabase.co"; 
    const SB_KEY = "sb_publishable_VRGqUrURUfbtW63olLBNhw_VtdKKIFN";
    
    const supabaseClient = window.supabase.createClient(SB_URL, SB_KEY);

    // 입력 상태 텍스트 변경 함수
    function setStatus(text, isSuccess = false) {
        const el = document.getElementById('status-indicator');
        el.innerText = text;
        if (isSuccess) {
            el.className = 'success';
        } else {
            el.className = '';
        }
    }

    // 화면의 모든 입력 데이터를 수집하는 함수
    function captureAllData() {
        return {
            memoMon: document.getElementById('memo-mon').value,
            memoTue: document.getElementById('memo-tue').value,
            weekTarget: document.getElementById('week-target').value,
            weekGood: document.getElementById('week-good').value,
            weekBad: document.getElementById('week-bad').value,
            weekNext: document.getElementById('week-next').value,
            updatedAt: new Date().toISOString()
        };
    }

    // 화면에 데이터를 뿌려주는 함수
    function applyDataToScreen(data) {
        if(!data) return;
        if(data.memoMon !== undefined) document.getElementById('memo-mon').value = data.memoMon;
        if(data.memoTue !== undefined) document.getElementById('memo-tue').value = data.memoTue;
        if(data.weekTarget !== undefined) document.getElementById('week-target').value = data.weekTarget;
        if(data.weekGood !== undefined) document.getElementById('week-good').value = data.weekGood;
        if(data.weekBad !== undefined) document.getElementById('week-bad').value = data.weekBad;
        if(data.weekNext !== undefined) document.getElementById('week-next').value = data.weekNext;
    }

    // 1. 서버에서 데이터 불러오기 (dbGet)
    async function loadData() {
        setStatus("🔄 동기화 중...");
        try {
            const { data, error } = await supabaseClient
                .from('planner_data') 
                .select('content')
                .order('created_at', { ascending: false })
                .limit(1)
                .single();

            if (error) {
                if (error.code === 'PGRST116') { 
                    setStatus("✅ 연결 완료 (기존 데이터 없음)", true);
                    return; 
                }
                throw error;
            }

            if (data && data.content) {
                const parsed = JSON.parse(data.content);
                applyDataToScreen(parsed);
                setStatus("// 동기화 성공", true);
            }
        } catch (err) {
            console.error(err);
            setStatus("⚠️ 서버 연결 실패 (로컬 모드)");
            const local = localStorage.getItem('planner_local_backup');
            if(local) applyDataToScreen(JSON.parse(local));
        }
    }

    // 2. 서버에 데이터 저장하기 (dbSet)
    async function saveData() {
        setStatus("💾 저장 중...");
        const currentData = captureAllData();
        const jsonString = JSON.stringify(currentData);
        
        // 브라우저 로컬 스토리지 안전 백업
        localStorage.setItem('planner_local_backup', jsonString);

        try {
            const { error } = await supabaseClient
                .from('planner_data')
                .insert([{ content: jsonString, created_at: new Date().toISOString() }]);

            if (error) throw error;
            setStatus("// 저장 성공", true);
        } catch (err) {
            console.error("저장 오류:", err);
            setStatus("❌ 저장 실패");
            alert("서버 저장 실패! Supabase에 'planner_data' 테이블이 생성되어 있는지, RLS(보안)가 꺼져있는지 확인이 필요합니다.");
        }
    }

    // 항목 추가 임시 함수
    function addTodo(day) {
        const container = document.getElementById(`todo-${day}`);
        const div = document.createElement('div');
        div.className = 'todo-item';
        div.innerHTML = `<input type="checkbox"> <input type="text" value=""> <button class="btn-del" onclick="this.parentElement.remove()">×</button>`;
        container.appendChild(div);
    }

    function changeMonth() {
        console.log("월 변경");
    }

    // 페이지 시작 시 작동
    window.onload = async () => {
        await loadData();
    };
</script>

</body>
</html>
