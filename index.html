<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>📖 스터디 플래너</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --rose:        #C4958A;
      --mocha:       #B5A898;
      --sage:        #9DB49A;
      --steel:       #8E9DB8;
      --slate:       #A0A8B0;
      --dusty-pink:  #C9A0A0;
      --olive:       #A8A87A;
      --lavender:    #A89EC0;
      --terracotta:  #C09878;
      --teal:        #7AABAA;

      --bg:          #F7F4F0;
      --surface:     #FFFFFF;
      --border:      #E5E0D8;
      --text:        #3D3630;
      --text-sub:    #7A7068;
      --text-light:  #AAA298;
      --accent:      #8E9DB8;
      --shadow:      rgba(80,60,40,0.08);

      --day-mon: #C4958A;
      --day-tue: #9DB49A;
      --day-wed: #8E9DB8;
      --day-thu: #A89EC0;
      --day-fri: #C09878;
      --day-sat: #7AABAA;
      --day-sun: #C9A0A0;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Login Screen ── */
    #login-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 20px;
      background: linear-gradient(135deg, #f0ebe4 0%, #e8e2d8 100%);
    }
    .login-card {
      background: var(--surface);
      border-radius: 24px;
      padding: 40px 36px;
      box-shadow: 0 8px 32px var(--shadow);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      width: 340px;
    }
    .login-emoji { font-size: 52px; }
    .login-card h1 { font-family:'Gowun Dodum',serif; font-size:22px; color:var(--text); }
    .login-card p  { font-size:13px; color:var(--text-sub); text-align:center; line-height:1.6; }
    .login-input {
      width:100%; padding:12px 16px; border:1.5px solid var(--border);
      border-radius:12px; font-size:15px; font-family:inherit; outline:none;
      transition: border-color .2s;
    }
    .login-input:focus { border-color: var(--accent); }
    .login-btn {
      width:100%; padding:13px; background:var(--accent); color:#fff;
      border:none; border-radius:12px; font-size:15px; font-family:inherit;
      cursor:pointer; font-weight:500; transition: opacity .2s;
    }
    .login-btn:hover { opacity:.88; }

    /* ── Layout ── */
    #app { display:none; flex-direction:column; min-height:100vh; }

    header {
      background: var(--surface);
      border-bottom: 1.5px solid var(--border);
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-left { display:flex; align-items:center; gap:10px; }
    .header-logo { font-family:'Gowun Dodum',serif; font-size:17px; color:var(--text); }
    .header-user {
      font-size:12px; color:var(--text-sub);
      background:var(--bg); padding:4px 10px; border-radius:20px;
    }
    .header-actions { display:flex; gap:8px; align-items:center; }
    .status-dot {
      width:8px; height:8px; border-radius:50%; background:#ccc;
      transition: background .3s;
    }
    .status-dot.connected { background: var(--sage); }

    .btn-sm {
      padding:6px 12px; border-radius:8px; border:1.5px solid var(--border);
      background:var(--surface); font-size:12px; font-family:inherit;
      cursor:pointer; color:var(--text); transition: all .15s;
    }
    .btn-sm:hover { background:var(--bg); border-color:var(--accent); }

    /* ── Tab Nav ── */
    .tab-nav {
      display:flex; border-bottom:1.5px solid var(--border);
      background:var(--surface); overflow-x:auto; flex-shrink:0;
    }
    .tab-btn {
      padding:10px 18px; border:none; background:none; cursor:pointer;
      font-size:13px; font-family:inherit; color:var(--text-sub);
      border-bottom:2.5px solid transparent; white-space:nowrap;
      transition: all .15s;
    }
    .tab-btn.active { color:var(--accent); border-bottom-color:var(--accent); font-weight:500; }

    /* ── Main Content ── */
    main { flex:1; overflow:auto; }
    .tab-panel { display:none; padding:20px; }
    .tab-panel.active { display:block; }

    /* ── Week Selector ── */
    .week-controls {
      display:flex; align-items:center; gap:12px; margin-bottom:20px;
      flex-wrap:wrap;
    }
    .week-controls label { font-size:13px; color:var(--text-sub); font-weight:500; }
    .select-styled {
      padding:7px 12px; border:1.5px solid var(--border); border-radius:10px;
      background:var(--surface); font-family:inherit; font-size:13px;
      color:var(--text); cursor:pointer; outline:none;
    }
    .select-styled:focus { border-color:var(--accent); }

    /* ── Planner Grid ── */
    .planner-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 10px;
    }
    .day-col {
      background: var(--surface);
      border-radius: 14px;
      border: 1.5px solid var(--border);
      overflow: hidden;
      min-width: 120px;
    }
    .day-header {
      padding: 10px 12px;
      font-size: 13px;
      font-weight: 600;
      color: #fff;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .day-header .day-name { font-size: 14px; letter-spacing:.03em; }
    .day-header .day-date-input {
      font-size: 12px;
      background: rgba(255,255,255,0.25);
      border: 1px solid rgba(255,255,255,0.4);
      border-radius: 6px;
      padding: 3px 7px;
      width: 100%;
      color: #fff;
      font-family: inherit;
      cursor: pointer;
      outline: none;
    }
    .day-header .day-date-input::placeholder { color: rgba(255,255,255,0.7); }
    .day-header .day-date-input:focus { background: rgba(255,255,255,0.35); }

    /* day completion bar */
    .day-completion-bar {
      padding: 6px 10px;
      background: rgba(0,0,0,0.06);
    }
    .day-completion-label {
      display:flex; justify-content:space-between;
      font-size:10px; color:rgba(255,255,255,0.85); margin-bottom:3px;
    }
    .day-bar-track {
      height:4px; background:rgba(255,255,255,0.25); border-radius:3px; overflow:hidden;
    }
    .day-bar-fill {
      height:100%; background:rgba(255,255,255,0.8); border-radius:3px;
      transition: width .4s ease;
    }

    .day-slots { padding:8px; display:flex; flex-direction:column; gap:6px; }

    /* slot card */
    .slot-card {
      border-radius: 9px;
      padding: 8px 10px;
      cursor: pointer;
      position: relative;
      transition: transform .12s, box-shadow .12s;
      min-height: 60px;
    }
    .slot-card:hover { transform:translateY(-1px); box-shadow:0 3px 10px var(--shadow); }
    .slot-card.empty {
      background: var(--bg);
      border: 1.5px dashed var(--border);
      display:flex; align-items:center; justify-content:center;
      color:var(--text-light); font-size:11px; min-height:50px;
    }
    .slot-card.has-subject {
      border: none;
      color: #fff;
    }
    .slot-card.has-event {
      background: #F5F0E8;
      border: 1.5px solid var(--border);
      color: var(--text);
    }
    .slot-card .slot-time { font-size:10px; opacity:.75; margin-bottom:2px; }
    .slot-card .slot-subject { font-size:12px; font-weight:600; }
    .slot-card .slot-duration { font-size:10px; opacity:.7; margin-top:1px; }
    .slot-done-btn {
      position:absolute; top:6px; right:6px;
      width:18px; height:18px; border-radius:50%;
      border:1.5px solid rgba(255,255,255,0.6);
      background:transparent; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      font-size:10px; color:rgba(255,255,255,0.8);
      transition: all .15s;
    }
    .slot-done-btn.done { background:rgba(255,255,255,0.9); color:#5a5a5a; }
    .slot-card.has-event .slot-done-btn {
      border-color:var(--border); color:var(--text-sub);
    }
    .slot-card.has-event .slot-done-btn.done { background:var(--sage); color:#fff; border-color:var(--sage); }

    .add-slot-btn {
      margin:0 8px 8px; padding:7px;
      border:1.5px dashed var(--border); border-radius:9px;
      background:none; cursor:pointer; width:calc(100% - 16px);
      font-size:11px; color:var(--text-light); font-family:inherit;
      transition: all .15s;
    }
    .add-slot-btn:hover { border-color:var(--accent); color:var(--accent); background:rgba(142,157,184,.06); }

    /* ── Modal ── */
    .modal-overlay {
      display:none; position:fixed; inset:0;
      background:rgba(60,50,40,0.45); backdrop-filter:blur(4px);
      z-index:200; align-items:center; justify-content:center;
    }
    .modal-overlay.open { display:flex; }
    .modal {
      background:var(--surface); border-radius:20px;
      padding:28px 24px; width:340px; max-width:92vw;
      box-shadow:0 20px 60px rgba(0,0,0,0.15);
      animation: modalIn .2s ease;
    }
    @keyframes modalIn { from{transform:scale(.95);opacity:0} to{transform:scale(1);opacity:1} }
    .modal h3 { font-size:16px; margin-bottom:18px; color:var(--text); }
    .modal-field { margin-bottom:14px; }
    .modal-field label { display:block; font-size:12px; color:var(--text-sub); margin-bottom:5px; font-weight:500; }
    .modal-field input,
    .modal-field select,
    .modal-field textarea {
      width:100%; padding:9px 12px;
      border:1.5px solid var(--border); border-radius:10px;
      font-family:inherit; font-size:14px; color:var(--text);
      background:var(--bg); outline:none; transition:border-color .2s;
    }
    .modal-field input:focus,
    .modal-field select:focus,
    .modal-field textarea:focus { border-color:var(--accent); }
    .modal-actions { display:flex; gap:8px; margin-top:20px; }
    .btn-cancel {
      flex:1; padding:10px; border:1.5px solid var(--border);
      border-radius:10px; background:none; font-family:inherit;
      font-size:14px; cursor:pointer; color:var(--text-sub);
    }
    .btn-confirm {
      flex:1; padding:10px; background:var(--accent); color:#fff;
      border:none; border-radius:10px; font-family:inherit;
      font-size:14px; cursor:pointer; font-weight:500;
    }
    .btn-danger {
      flex:1; padding:10px; background:#e87070; color:#fff;
      border:none; border-radius:10px; font-family:inherit;
      font-size:14px; cursor:pointer;
    }
    .subject-chips {
      display:flex; flex-wrap:wrap; gap:6px; margin-bottom:8px;
    }
    .subject-chip {
      padding:5px 11px; border-radius:20px; font-size:12px;
      cursor:pointer; border:2px solid transparent; color:#fff;
      transition: transform .1s, box-shadow .1s;
    }
    .subject-chip:hover { transform:scale(1.04); box-shadow:0 2px 8px var(--shadow); }
    .subject-chip.selected { border-color:#fff; box-shadow:0 2px 12px var(--shadow); }
    .type-tabs { display:flex; gap:6px; margin-bottom:10px; }
    .type-tab {
      flex:1; padding:7px; border-radius:8px; border:1.5px solid var(--border);
      background:none; font-family:inherit; font-size:12px; cursor:pointer;
      color:var(--text-sub); transition:all .15s;
    }
    .type-tab.active { background:var(--accent); color:#fff; border-color:var(--accent); }

    /* ── Subject Manager ── */
    .subject-list { display:flex; flex-direction:column; gap:8px; margin-bottom:16px; }
    .subject-item {
      display:flex; align-items:center; gap:10px; padding:10px 12px;
      background:var(--bg); border-radius:10px; border:1.5px solid var(--border);
    }
    .subject-color-dot { width:14px; height:14px; border-radius:50%; flex-shrink:0; }
    .subject-name { flex:1; font-size:14px; }
    .subject-goal { font-size:11px; color:var(--text-sub); }
    .btn-icon {
      width:28px; height:28px; border-radius:8px; border:none;
      background:none; cursor:pointer; font-size:13px; color:var(--text-sub);
      transition:background .15s;
    }
    .btn-icon:hover { background:var(--border); }
    .add-subject-row {
      display:flex; gap:8px;
    }
    .add-subject-row input {
      flex:1; padding:8px 12px; border:1.5px solid var(--border);
      border-radius:10px; font-family:inherit; font-size:13px; outline:none;
    }
    .add-subject-row input:focus { border-color:var(--accent); }
    .color-picker-row { display:flex; gap:6px; flex-wrap:wrap; margin:8px 0; }
    .color-swatch {
      width:24px; height:24px; border-radius:50%; cursor:pointer;
      border:2px solid transparent; transition:transform .1s;
    }
    .color-swatch:hover { transform:scale(1.15); }
    .color-swatch.selected { border-color:var(--text); }

    /* ── Stats ── */
    .stats-section { margin-bottom:28px; }
    .stats-section h3 { font-size:15px; font-weight:600; margin-bottom:14px; color:var(--text); }
    .stats-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:12px; }
    .stat-card {
      background:var(--surface); border-radius:14px; padding:16px;
      border:1.5px solid var(--border); text-align:center;
    }
    .stat-card .stat-val { font-size:28px; font-weight:700; color:var(--accent); }
    .stat-card .stat-label { font-size:11px; color:var(--text-sub); margin-top:2px; }

    /* donut chart */
    .chart-wrap {
      background:var(--surface); border-radius:14px; padding:20px;
      border:1.5px solid var(--border);
    }
    .chart-inner { display:flex; align-items:center; gap:24px; flex-wrap:wrap; }
    .donut-svg { flex-shrink:0; }
    .legend { display:flex; flex-direction:column; gap:8px; }
    .legend-item { display:flex; align-items:center; gap:8px; font-size:13px; }
    .legend-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
    .legend-pct { font-weight:600; color:var(--text); }
    .legend-name { color:var(--text-sub); }

    /* bar chart */
    .bar-chart { display:flex; align-items:flex-end; gap:6px; height:120px; margin-top:10px; }
    .bar-col { display:flex; flex-direction:column; align-items:center; gap:4px; flex:1; }
    .bar-fill { width:100%; border-radius:6px 6px 0 0; min-height:4px; transition:height .4s ease; }
    .bar-label { font-size:10px; color:var(--text-sub); white-space:nowrap; }
    .bar-val { font-size:10px; color:var(--text-sub); }

    /* progress bar */
    .progress-row { display:flex; align-items:center; gap:10px; margin-bottom:8px; }
    .progress-label { width:80px; font-size:12px; color:var(--text-sub); text-align:right; flex-shrink:0; }
    .progress-track { flex:1; height:8px; background:var(--border); border-radius:4px; overflow:hidden; }
    .progress-fill { height:100%; border-radius:4px; transition:width .4s ease; }
    .progress-pct { width:36px; font-size:12px; color:var(--text); font-weight:600; flex-shrink:0; }

    /* ── Toast ── */
    #toast {
      position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(20px);
      background:var(--text); color:#fff; padding:10px 18px; border-radius:12px;
      font-size:13px; opacity:0; transition:all .25s; z-index:999; pointer-events:none;
    }
    #toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

    /* ── Responsive ── */
    @media(max-width:900px){
      .planner-grid { grid-template-columns:repeat(4,1fr); }
    }
    @media(max-width:600px){
      .planner-grid { grid-template-columns:repeat(2,1fr); }
      .tab-btn { padding:10px 12px; font-size:12px; }
    }
  </style>
</head>
<body>

<!-- ── Login ── -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-emoji">📖</div>
    <h1>주간 스터디 플래너</h1>
    <p>닉네임으로 어디서든 동기화<br>같은 닉네임으로 이어서 쓸 수 있어요</p>
    <input id="nickname-input" class="login-input" type="text" placeholder="닉네임 입력" maxlength="20" />
    <button class="login-btn" onclick="startApp()">시작하기</button>
  </div>
</div>

<!-- ── App ── -->
<div id="app">
  <header>
    <div class="header-left">
      <span class="header-logo">📖 스터디 플래너</span>
      <span class="header-user" id="header-user"></span>
    </div>
    <div class="header-actions">
      <div class="status-dot" id="status-dot" title="연결 상태"></div>
      <button class="btn-sm" onclick="saveData()">💾 저장</button>
      <button class="btn-sm" onclick="window.print()">🖨️ 출력</button>
      <button class="btn-sm" onclick="logout()">로그아웃</button>
    </div>
  </header>

  <nav class="tab-nav">
    <button class="tab-btn active" onclick="switchTab('planner',this)">📅 플래너</button>
    <button class="tab-btn" onclick="switchTab('progress',this)">📊 진도관리</button>
    <button class="tab-btn" onclick="switchTab('stats',this)">📈 성취통계</button>
    <button class="tab-btn" onclick="switchTab('subjects',this)">📚 과목</button>
  </nav>

  <main>
    <!-- ── Planner Tab ── -->
    <div id="tab-planner" class="tab-panel active">
      <div class="week-controls">
        <label>월</label>
        <select id="sel-month" class="select-styled" onchange="onWeekChange()"></select>
        <label>주차</label>
        <select id="sel-week" class="select-styled" onchange="onWeekChange()"></select>
        <span id="week-range-label" style="font-size:12px;color:var(--text-sub)"></span>
      </div>
      <div class="planner-grid" id="planner-grid"></div>
    </div>

    <!-- ── Progress Tab ── -->
    <div id="tab-progress" class="tab-panel">
      <div class="week-controls">
        <label>월</label>
        <select id="prog-month" class="select-styled" onchange="renderProgress()"></select>
        <label>주차</label>
        <select id="prog-week" class="select-styled" onchange="renderProgress()"></select>
      </div>
      <div id="progress-content"></div>
    </div>

    <!-- ── Stats Tab ── -->
    <div id="tab-stats" class="tab-panel">
      <div class="week-controls">
        <label>기간</label>
        <select id="stats-period" class="select-styled" onchange="renderStats()">
          <option value="week">이번 주</option>
          <option value="month">이번 달</option>
        </select>
      </div>
      <div id="stats-content"></div>
    </div>

    <!-- ── Subjects Tab ── -->
    <div id="tab-subjects" class="tab-panel">
      <div class="stats-section">
        <h3>📚 과목 목록</h3>
        <div id="subject-list-ui" class="subject-list"></div>
        <div class="add-subject-row">
          <input id="new-subject-input" placeholder="새 과목 이름" />
          <button class="btn-confirm" onclick="openAddSubjectModal()">추가</button>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- ── Slot Edit Modal ── -->
<div class="modal-overlay" id="slot-modal">
  <div class="modal">
    <h3 id="slot-modal-title">일정 편집</h3>
    <div class="type-tabs">
      <button class="type-tab active" id="type-study" onclick="setSlotType('study')">📚 공부</button>
      <button class="type-tab" id="type-event" onclick="setSlotType('event')">📌 일정</button>
    </div>
    <div id="study-fields">
      <div class="modal-field">
        <label>과목 선택</label>
        <div class="subject-chips" id="modal-subject-chips"></div>
      </div>
      <div class="modal-field">
        <label>목표 시간</label>
        <div style="display:flex;gap:8px;">
          <select id="modal-time-start" class="select-styled" style="flex:1"></select>
          <span style="align-self:center;color:var(--text-sub)">~</span>
          <select id="modal-time-end" class="select-styled" style="flex:1"></select>
        </div>
      </div>
      <div class="modal-field">
        <label>메모</label>
        <textarea id="modal-memo" rows="2" placeholder="선택 입력"></textarea>
      </div>
    </div>
    <div id="event-fields" style="display:none">
      <div class="modal-field">
        <label>일정 이름</label>
        <input id="modal-event-name" placeholder="예) 저녁식사, 알바" />
      </div>
      <div class="modal-field">
        <label>시간</label>
        <div style="display:flex;gap:8px;">
          <select id="modal-event-start" class="select-styled" style="flex:1"></select>
          <span style="align-self:center;color:var(--text-sub)">~</span>
          <select id="modal-event-end" class="select-styled" style="flex:1"></select>
        </div>
      </div>
      <div class="modal-field">
        <label>메모</label>
        <textarea id="modal-event-memo" rows="2" placeholder="선택 입력"></textarea>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-danger" id="btn-delete-slot" onclick="deleteSlot()">삭제</button>
      <button class="btn-cancel" onclick="closeSlotModal()">취소</button>
      <button class="btn-confirm" onclick="saveSlot()">확인</button>
    </div>
  </div>
</div>

<!-- ── Add Subject Modal ── -->
<div class="modal-overlay" id="subject-modal">
  <div class="modal">
    <h3>📚 과목 추가/편집</h3>
    <div class="modal-field">
      <label>과목명</label>
      <input id="subj-name" placeholder="예) 수학, 영어" />
    </div>
    <div class="modal-field">
      <label>색상</label>
      <div class="color-picker-row" id="color-picker-row"></div>
    </div>
    <div class="modal-field">
      <label>주간 목표 시간 (h)</label>
      <input id="subj-goal" type="number" min="0" max="100" step="0.5" placeholder="예) 10" />
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeSubjectModal()">취소</button>
      <button class="btn-confirm" onclick="saveSubject()">저장</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const SUPABASE_URL = 'https://gbjlroojsweedundumfi.supabase.co';
const SUPABASE_KEY = 'sb_publishable_VRGqUrURUfbtW63olLBNhw_VtdKKIFN';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

const PALETTE = [
  { name:'Rose',       hex:'#C4958A' },
  { name:'Mocha',      hex:'#B5A898' },
  { name:'Sage',       hex:'#9DB49A' },
  { name:'Steel Blue', hex:'#8E9DB8' },
  { name:'Slate',      hex:'#A0A8B0' },
  { name:'Dusty Pink', hex:'#C9A0A0' },
  { name:'Olive',      hex:'#A8A87A' },
  { name:'Lavender',   hex:'#A89EC0' },
  { name:'Terracotta', hex:'#C09878' },
  { name:'Teal',       hex:'#7AABAA' },
];

const DAY_COLORS = {
  '월': '#C4958A', '화': '#9DB49A', '수': '#8E9DB8',
  '목': '#A89EC0', '금': '#C09878', '토': '#7AABAA', '일': '#C9A0A0'
};
const DAYS = ['월','화','수','목','금','토','일'];

let userId = '';
let appData = { subjects: [], weeks: {} };
let currentWeekKey = '';
let editingSlot = null;
let slotModalDayIdx = 0;
let slotType = 'study';
let editingSubjectId = null;
let selectedSubjectId = null;
let selectedColor = PALETTE[0].hex;

function timeOptions() {
  const opts = [];
  for (let h = 0; h < 24; h++) {
    for (let m = 0; m < 60; m += 30) {
      opts.push(`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`);
    }
  }
  return opts;
}
function populateTimeSelect(sel, defaultVal) {
  sel.innerHTML = '';
  timeOptions().forEach(t => {
    const o = document.createElement('option');
    o.value = t; o.textContent = t;
    sel.appendChild(o);
  });
  if (defaultVal) sel.value = defaultVal;
}
function minutesBetween(t1, t2) {
  const [h1,m1] = t1.split(':').map(Number);
  const [h2,m2] = t2.split(':').map(Number);
  return (h2*60+m2) - (h1*60+m1);
}
function formatDuration(mins) {
  if (mins <= 0) return '';
  const h = Math.floor(mins/60), m = mins%60;
  if (h && m) return `${h}h ${m}m`;
  if (h) return `${h}h`;
  return `${m}m`;
}

function weekKey(month, week) { return `${new Date().getFullYear()}-${String(month).padStart(2,'0')}-W${week}`; }
function getCurrentWeekKey() {
  const now = new Date();
  return weekKey(now.getMonth()+1, Math.ceil(now.getDate()/7));
}
function ensureWeek(key) {
  if (!appData.weeks[key]) appData.weeks[key] = { dates:['','','','','','',''], slots:[] };
}
function getWeek() { ensureWeek(currentWeekKey); return appData.weeks[currentWeekKey]; }

function startApp() {
  const name = document.getElementById('nickname-input').value.trim();
  if (!name) { showToast('닉네임을 입력해주세요'); return; }
  userId = name;
  document.getElementById('header-user').textContent = `👤 ${name}`;
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  initSelectors();
  loadData();
}
document.getElementById('nickname-input').addEventListener('keydown', e => { if(e.key==='Enter') startApp(); });

function logout() {
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  userId = '';
  appData = { subjects:[], weeks:{} };
}

async function loadData() {
  try {
    const { data, error } = await db.from('planner_data')
      .select('*').eq('user_id', userId).order('created_at', { ascending:false }).limit(1);
    if (!error && data && data.length) {
      appData = JSON.parse(data[0].content);
      if (!appData.subjects) appData.subjects = [];
      if (!appData.weeks) appData.weeks = {};
    }
    setConnected(true);
  } catch(e) { setConnected(false); }
  renderAll();
}

async function saveData() {
  try {
    const { error } = await db.from('planner_data').upsert({
      user_id: userId,
      week_key: currentWeekKey,
      content: JSON.stringify(appData),
      created_at: new Date().toISOString()
    }, { onConflict: 'user_id' });
    if (!error) { showToast('저장 완료 ✓'); setConnected(true); }
    else throw error;
  } catch(e) { showToast('저장 실패 — 네트워크 확인'); setConnected(false); }
}

function setConnected(v) {
  const dot = document.getElementById('status-dot');
  dot.classList.toggle('connected', v);
  dot.title = v ? '연결됨' : '연결 실패';
}

function initSelectors() {
  const months = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  ['sel-month','prog-month'].forEach(id => {
    const s = document.getElementById(id);
    s.innerHTML = months.map((m,i) => `<option value="${i+1}">${m}</option>`).join('');
    s.value = new Date().getMonth()+1;
  });
  ['sel-week','prog-week'].forEach(id => {
    const s = document.getElementById(id);
    s.innerHTML = [1,2,3,4,5].map(w => `<option value="${w}">${w}주차</option>`).join('');
    s.value = Math.ceil(new Date().getDate()/7);
  });
  currentWeekKey = getCurrentWeekKey();
  updateWeekLabel();
}

function onWeekChange() {
  const m = +document.getElementById('sel-month').value;
  const w = +document.getElementById('sel-week').value;
  currentWeekKey = weekKey(m, w);
  updateWeekLabel();
  renderPlanner();
}

function updateWeekLabel() {
  const parts = currentWeekKey.split(/[-W]/);
  const y = +parts[0], mo = +parts[1], wn = +parts[3];
  const firstDay = new Date(y, mo-1, 1);
  const dow = firstDay.getDay() || 7;
  const monday = new Date(firstDay);
  monday.setDate(1 - (dow-1) + (wn-1)*7);
  const sunday = new Date(monday); sunday.setDate(monday.getDate()+6);
  const fmt = d => `${d.getMonth()+1}/${d.getDate()}`;
  document.getElementById('week-range-label').textContent = `(${fmt(monday)} ~ ${fmt(sunday)})`;
  const week = getWeek();
  DAYS.forEach((_, i) => {
    if (!week.dates[i]) {
      const d = new Date(monday); d.setDate(monday.getDate()+i);
      week.dates[i] = `${d.getMonth()+1}/${d.getDate()}`;
    }
  });
}

function renderAll() { renderPlanner(); renderSubjectList(); renderProgress(); renderStats(); }

function renderPlanner() {
  const week = getWeek();
  const grid = document.getElementById('planner-grid');
  grid.innerHTML = '';
  DAYS.forEach((day, i) => {
    const col = document.createElement('div');
    col.className = 'day-col';
    const slots = week.slots.filter(s => s.dayIdx === i);
    const total = slots.reduce((acc,s)=>acc+Math.max(0,minutesBetween(s.startTime,s.endTime)),0);
    const done  = slots.filter(s=>s.done).reduce((acc,s)=>acc+Math.max(0,minutesBetween(s.startTime,s.endTime)),0);
    const pct   = total>0 ? Math.round(done/total*100) : 0;
    col.innerHTML = `
      <div class="day-header" style="background:${DAY_COLORS[day]}">
        <div class="day-name">${day}요일</div>
        <input class="day-date-input" type="text"
          placeholder="날짜 (예: 5/20)"
          value="${week.dates[i]||''}"
          onchange="setDate(${i},this.value)"
        />
        <div class="day-completion-bar">
          <div class="day-completion-label"><span>완료율</span><span>${pct}%</span></div>
          <div class="day-bar-track"><div class="day-bar-fill" style="width:${pct}%"></div></div>
        </div>
      </div>
      <div class="day-slots" id="slots-${i}"></div>
      <button class="add-slot-btn" onclick="openSlotModal(${i},null)">+ 일정 추가</button>
    `;
    grid.appendChild(col);
    const slotsEl = col.querySelector(`#slots-${i}`);
    if (!slots.length) {
      slotsEl.innerHTML = `<div class="slot-card empty">일정 없음</div>`;
    } else {
      slots.sort((a,b)=>a.startTime.localeCompare(b.startTime));
      slots.forEach(slot => slotsEl.appendChild(buildSlotCard(slot,i)));
    }
  });
}

function buildSlotCard(slot, dayIdx) {
  const card = document.createElement('div');
  const dur = minutesBetween(slot.startTime, slot.endTime);
  if (slot.type === 'event') {
    card.className = 'slot-card has-event';
    card.innerHTML = `
      <div class="slot-time">${slot.startTime} ~ ${slot.endTime}</div>
      <div class="slot-subject">📌 ${slot.eventName||'일정'}</div>
      ${dur>0?`<div class="slot-duration">${formatDuration(dur)}</div>`:''}
      <button class="slot-done-btn${slot.done?' done':''}" onclick="toggleDone(event,${dayIdx},'${slot.id}')">${slot.done?'✓':'○'}</button>
    `;
  } else {
    const subj = appData.subjects.find(s=>s.id===slot.subjectId);
    const color = subj ? subj.color : '#A0A8B0';
    card.className = 'slot-card has-subject';
    card.style.background = color;
    card.innerHTML = `
      <div class="slot-time">${slot.startTime} ~ ${slot.endTime}</div>
      <div class="slot-subject">${subj?subj.name:'?'}</div>
      ${dur>0?`<div class="slot-duration">${formatDuration(dur)}</div>`:''}
      ${slot.memo?`<div class="slot-duration" style="margin-top:3px;font-style:italic">${slot.memo}</div>`:''}
      <button class="slot-done-btn${slot.done?' done':''}" onclick="toggleDone(event,${dayIdx},'${slot.id}')">${slot.done?'✓':'○'}</button>
    `;
  }
  card.addEventListener('click', ()=>openSlotModal(dayIdx,slot.id));
  return card;
}

function setDate(dayIdx, val) { getWeek().dates[dayIdx] = val; }

function toggleDone(e, dayIdx, slotId) {
  e.stopPropagation();
  const slot = getWeek().slots.find(s=>s.id===slotId);
  if (slot) { slot.done = !slot.done; renderPlanner(); renderProgress(); renderStats(); }
}

function openSlotModal(dayIdx, slotId) {
  slotModalDayIdx = dayIdx;
  editingSlot = slotId;
  const slot = slotId ? getWeek().slots.find(s=>s.id===slotId) : null;
  document.getElementById('slot-modal-title').textContent = slot ? '일정 편집' : (DAYS[dayIdx]+'요일 일정 추가');
  ['modal-time-start','modal-time-end','modal-event-start','modal-event-end'].forEach(id => populateTimeSelect(document.getElementById(id)));
  if (slot) {
    setSlotType(slot.type||'study');
    if (slot.type==='event') {
      document.getElementById('modal-event-name').value = slot.eventName||'';
      document.getElementById('modal-event-start').value = slot.startTime||'09:00';
      document.getElementById('modal-event-end').value   = slot.endTime||'10:00';
      document.getElementById('modal-event-memo').value  = slot.memo||'';
    } else {
      selectedSubjectId = slot.subjectId;
      document.getElementById('modal-time-start').value = slot.startTime||'09:00';
      document.getElementById('modal-time-end').value   = slot.endTime||'10:00';
      document.getElementById('modal-memo').value = slot.memo||'';
    }
    document.getElementById('btn-delete-slot').style.display = '';
  } else {
    setSlotType('study');
    document.getElementById('modal-time-start').value = '09:00';
    document.getElementById('modal-time-end').value   = '10:00';
    document.getElementById('modal-event-start').value = '09:00';
    document.getElementById('modal-event-end').value   = '10:00';
    document.getElementById('modal-memo').value = '';
    document.getElementById('modal-event-name').value = '';
    document.getElementById('modal-event-memo').value = '';
    selectedSubjectId = null;
    document.getElementById('btn-delete-slot').style.display = 'none';
  }
  renderSubjectChips();
  document.getElementById('slot-modal').classList.add('open');
}

function setSlotType(type) {
  slotType = type;
  document.getElementById('type-study').classList.toggle('active', type==='study');
  document.getElementById('type-event').classList.toggle('active', type==='event');
  document.getElementById('study-fields').style.display = type==='study'?'':'none';
  document.getElementById('event-fields').style.display = type==='event'?'':'none';
}

function renderSubjectChips() {
  const wrap = document.getElementById('modal-subject-chips');
  wrap.innerHTML = '';
  appData.subjects.forEach(subj => {
    const chip = document.createElement('div');
    chip.className = 'subject-chip'+(selectedSubjectId===subj.id?' selected':'');
    chip.style.background = subj.color;
    chip.textContent = subj.name;
    chip.onclick = ()=>{ selectedSubjectId=subj.id; renderSubjectChips(); };
    wrap.appendChild(chip);
  });
}

function closeSlotModal() { document.getElementById('slot-modal').classList.remove('open'); }

function saveSlot() {
  const week = getWeek();
  if (slotType==='study') {
    if (!selectedSubjectId) { showToast('과목을 선택해주세요'); return; }
    const start = document.getElementById('modal-time-start').value;
    const end   = document.getElementById('modal-time-end').value;
    const memo  = document.getElementById('modal-memo').value;
    if (editingSlot) {
      const s = week.slots.find(x=>x.id===editingSlot);
      if(s){s.subjectId=selectedSubjectId;s.startTime=start;s.endTime=end;s.memo=memo;s.type='study';}
    } else {
      week.slots.push({id:uid(),dayIdx:slotModalDayIdx,type:'study',subjectId:selectedSubjectId,startTime:start,endTime:end,memo,done:false});
    }
  } else {
    const name  = document.getElementById('modal-event-name').value.trim()||'일정';
    const start = document.getElementById('modal-event-start').value;
    const end   = document.getElementById('modal-event-end').value;
    const memo  = document.getElementById('modal-event-memo').value;
    if (editingSlot) {
      const s = week.slots.find(x=>x.id===editingSlot);
      if(s){s.eventName=name;s.startTime=start;s.endTime=end;s.memo=memo;s.type='event';}
    } else {
      week.slots.push({id:uid(),dayIdx:slotModalDayIdx,type:'event',eventName:name,startTime:start,endTime:end,memo,done:false});
    }
  }
  closeSlotModal();
  renderPlanner(); renderProgress(); renderStats();
}

function deleteSlot() {
  if (!editingSlot) return;
  const week = getWeek();
  week.slots = week.slots.filter(s=>s.id!==editingSlot);
  closeSlotModal();
  renderPlanner(); renderProgress(); renderStats();
}

function renderSubjectList() {
  const ul = document.getElementById('subject-list-ui');
  ul.innerHTML = '';
  if (!appData.subjects.length) {
    ul.innerHTML = '<div style="font-size:13px;color:var(--text-light);padding:8px">과목을 추가해보세요</div>';
    return;
  }
  appData.subjects.forEach(subj => {
    const row = document.createElement('div');
    row.className = 'subject-item';
    row.innerHTML = `
      <div class="subject-color-dot" style="background:${subj.color}"></div>
      <div class="subject-name">${subj.name}</div>
      <div class="subject-goal">${subj.goal?'목표 '+subj.goal+'h/주':''}</div>
      <button class="btn-icon" onclick="editSubject('${subj.id}')">✏️</button>
      <button class="btn-icon" onclick="removeSubject('${subj.id}')">🗑️</button>
    `;
    ul.appendChild(row);
  });
}

function openAddSubjectModal() {
  editingSubjectId = null;
  document.getElementById('subj-name').value = document.getElementById('new-subject-input').value.trim();
  document.getElementById('subj-goal').value = '';
  selectedColor = PALETTE[appData.subjects.length % PALETTE.length].hex;
  renderColorPicker();
  document.getElementById('subject-modal').classList.add('open');
}

function editSubject(id) {
  editingSubjectId = id;
  const subj = appData.subjects.find(s=>s.id===id);
  if (!subj) return;
  document.getElementById('subj-name').value = subj.name;
  document.getElementById('subj-goal').value = subj.goal||'';
  selectedColor = subj.color;
  renderColorPicker();
  document.getElementById('subject-modal').classList.add('open');
}

function renderColorPicker() {
  const row = document.getElementById('color-picker-row');
  row.innerHTML = '';
  PALETTE.forEach(p => {
    const sw = document.createElement('div');
    sw.className = 'color-swatch'+(p.hex===selectedColor?' selected':'');
    sw.style.background = p.hex;
    sw.title = p.name;
    sw.onclick = ()=>{ selectedColor=p.hex; renderColorPicker(); };
    row.appendChild(sw);
  });
}

function saveSubject() {
  const name = document.getElementById('subj-name').value.trim();
  if (!name) { showToast('과목명을 입력해주세요'); return; }
  const goal = parseFloat(document.getElementById('subj-goal').value)||0;
  if (editingSubjectId) {
    const subj = appData.subjects.find(s=>s.id===editingSubjectId);
    if (subj) { subj.name=name; subj.color=selectedColor; subj.goal=goal; }
  } else {
    appData.subjects.push({id:uid(),name,color:selectedColor,goal});
  }
  document.getElementById('new-subject-input').value='';
  closeSubjectModal();
  renderSubjectList();
  renderPlanner();
}

function removeSubject(id) {
  if (!confirm('과목을 삭제할까요?')) return;
  appData.subjects = appData.subjects.filter(s=>s.id!==id);
  renderSubjectList(); renderPlanner();
}

function closeSubjectModal() { document.getElementById('subject-modal').classList.remove('open'); }

function renderProgress() {
  const m = +document.getElementById('prog-month').value;
  const w = +document.getElementById('prog-week').value;
  const key = weekKey(m,w);
  ensureWeek(key);
  const week = appData.weeks[key];
  const slots = week.slots.filter(s=>s.type==='study');
  const subjectStats = {};
  appData.subjects.forEach(s=>{ subjectStats[s.id]={done:0,total:0}; });
  slots.forEach(s=>{
    const mins = Math.max(0,minutesBetween(s.startTime,s.endTime));
    if (!subjectStats[s.subjectId]) subjectStats[s.subjectId]={done:0,total:0};
    subjectStats[s.subjectId].total += mins;
    if(s.done) subjectStats[s.subjectId].done += mins;
  });
  const allTotal = slots.reduce((a,s)=>a+Math.max(0,minutesBetween(s.startTime,s.endTime)),0);
  const allDone  = slots.filter(s=>s.done).reduce((a,s)=>a+Math.max(0,minutesBetween(s.startTime,s.endTime)),0);
  const overallPct = allTotal>0?Math.round(allDone/allTotal*100):0;
  let html = `
    <div class="stats-section">
      <h3>📊 주간 전체 완료율</h3>
      <div class="stat-card" style="display:inline-block;min-width:200px;text-align:center;margin-bottom:12px">
        <div class="stat-val">${overallPct}%</div>
        <div class="stat-label">${formatDuration(allDone)||'0m'} / ${formatDuration(allTotal)||'0m'}</div>
      </div>
    </div>
    <div class="stats-section"><h3>📚 과목별 진도</h3>
  `;
  appData.subjects.forEach(subj=>{
    const st = subjectStats[subj.id]||{done:0,total:0};
    const pct = st.total>0?Math.round(st.done/st.total*100):0;
    const goalMins = (subj.goal||0)*60;
    const goalPct  = goalMins>0?Math.min(100,Math.round(st.total/goalMins*100)):null;
    html += `
      <div class="progress-row">
        <div class="progress-label" style="color:${subj.color};font-weight:600">${subj.name}</div>
        <div class="progress-track"><div class="progress-fill" style="width:${pct}%;background:${subj.color}"></div></div>
        <div class="progress-pct">${pct}%</div>
      </div>
      <div style="font-size:11px;color:var(--text-light);margin:-4px 0 8px 90px">
        ${formatDuration(st.done)||'0m'} / ${formatDuration(st.total)||'0m'}
        ${goalPct!==null?` · 목표 대비 ${goalPct}%`:''}
      </div>
    `;
  });
  html += '</div><div class="stats-section"><h3>📅 요일별 완료율</h3>';
  DAYS.forEach((day,i)=>{
    const daySl = week.slots.filter(s=>s.dayIdx===i);
    const dt = daySl.reduce((a,s)=>a+Math.max(0,minutesBetween(s.startTime,s.endTime)),0);
    const dd = daySl.filter(s=>s.done).reduce((a,s)=>a+Math.max(0,minutesBetween(s.startTime,s.endTime)),0);
    const dp = dt>0?Math.round(dd/dt*100):0;
    html += `
      <div class="progress-row">
        <div class="progress-label" style="color:${DAY_COLORS[day]};font-weight:600">${day}요일</div>
        <div class="progress-track"><div class="progress-fill" style="width:${dp}%;background:${DAY_COLORS[day]}"></div></div>
        <div class="progress-pct">${dp}%</div>
      </div>
    `;
  });
  html += '</div>';
  document.getElementById('progress-content').innerHTML = html;
}

function renderStats() {
  const period = document.getElementById('stats-period').value;
  const thisMonth = new Date().getMonth()+1;
  let slots = [];
  if (period==='week') {
    ensureWeek(currentWeekKey);
    slots = (appData.weeks[currentWeekKey]?.slots||[]).filter(s=>s.type==='study');
  } else {
    for(let w=1;w<=5;w++){
      const k=weekKey(thisMonth,w);
      if(appData.weeks[k]) slots=slots.concat(appData.weeks[k].slots.filter(s=>s.type==='study'));
    }
  }
  const subjectMins = {};
  appData.subjects.forEach(s=>{subjectMins[s.id]=0;});
  slots.forEach(s=>{
    const m=Math.max(0,minutesBetween(s.startTime,s.endTime));
    if(!subjectMins[s.subjectId]) subjectMins[s.subjectId]=0;
    subjectMins[s.subjectId]+=m;
  });
  const totalMins = Object.values(subjectMins).reduce((a,b)=>a+b,0);
  const doneMins  = slots.filter(s=>s.done).reduce((a,s)=>a+Math.max(0,minutesBetween(s.startTime,s.endTime)),0);
  const completionPct = totalMins>0?Math.round(doneMins/totalMins*100):0;
  const donutData = appData.subjects.map(s=>({name:s.name,color:s.color,mins:subjectMins[s.id]||0})).filter(d=>d.mins>0);
  let html = `
    <div class="stats-section">
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-val">${formatDuration(totalMins)||'0m'}</div><div class="stat-label">${period==='week'?'이번 주':'이번 달'} 총 학습</div></div>
        <div class="stat-card"><div class="stat-val">${completionPct}%</div><div class="stat-label">전체 완료율</div></div>
        <div class="stat-card"><div class="stat-val">${slots.filter(s=>s.done).length}</div><div class="stat-label">완료된 슬롯</div></div>
        <div class="stat-card"><div class="stat-val">${appData.subjects.length}</div><div class="stat-label">등록 과목</div></div>
      </div>
    </div>
  `;
  if (donutData.length) {
    html += `
      <div class="stats-section">
        <h3>📊 과목별 공부 비중</h3>
        <div class="chart-wrap">
          <div class="chart-inner">
            ${buildDonut(donutData,totalMins)}
            <div class="legend">
              ${donutData.map(d=>`
                <div class="legend-item">
                  <div class="legend-dot" style="background:${d.color}"></div>
                  <span class="legend-pct">${Math.round(d.mins/totalMins*100)}%</span>
                  <span class="legend-name">${d.name} (${formatDuration(d.mins)})</span>
                </div>
              `).join('')}
            </div>
          </div>
        </div>
      </div>
    `;
  }
  if (period==='week') {
    const week = appData.weeks[currentWeekKey];
    if (week) {
      const dayMins = DAYS.map((_,i)=>(week.slots||[]).filter(s=>s.dayIdx===i&&s.type==='study').reduce((a,s)=>a+Math.max(0,minutesBetween(s.startTime,s.endTime)),0));
      const maxM = Math.max(...dayMins,1);
      html += `
        <div class="stats-section">
          <h3>📅 요일별 학습량</h3>
          <div class="chart-wrap">
            <div class="bar-chart">
              ${DAYS.map((d,i)=>`
                <div class="bar-col">
                  <div class="bar-val">${dayMins[i]?formatDuration(dayMins[i]):''}</div>
                  <div class="bar-fill" style="height:${Math.round(dayMins[i]/maxM*100)}px;background:${DAY_COLORS[d]}"></div>
                  <div class="bar-label">${d}</div>
                </div>
              `).join('')}
            </div>
          </div>
        </div>
      `;
    }
  }
  document.getElementById('stats-content').innerHTML = html;
}

function buildDonut(data, total) {
  const r=60,cx=70,cy=70,stroke=28;
  const circ = 2*Math.PI*r;
  let offset=0;
  const slices = data.map(d=>{const pct=d.mins/total;const s={pct,offset,color:d.color};offset+=pct;return s;});
  const paths = slices.map(s=>{
    const dLen=s.pct*circ;
    const dOff=circ-s.offset*circ;
    return `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${s.color}" stroke-width="${stroke}" stroke-dasharray="${dLen} ${circ-dLen}" stroke-dashoffset="${dOff}" transform="rotate(-90 ${cx} ${cy})"/>`;
  }).join('');
  return `<svg class="donut-svg" viewBox="0 0 140 140" width="140" height="140">
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--border)" stroke-width="${stroke}"/>
    ${paths}
    <text x="${cx}" y="${cy+5}" text-anchor="middle" font-size="13" fill="var(--text)" font-family="inherit">${formatDuration(total)||'0'}</text>
  </svg>`;
}

function switchTab(name, btn) {
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-'+name).classList.add('active');
  if(name==='progress') renderProgress();
  if(name==='stats') renderStats();
  if(name==='subjects') renderSubjectList();
}

document.addEventListener('change', e=>{
  if(e.target.id==='prog-month'||e.target.id==='prog-week') renderProgress();
});

function uid() { return Math.random().toString(36).slice(2,10); }

function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

setInterval(()=>{ if(userId) saveData(); }, 3*60*1000);
</script>
