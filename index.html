<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>📖 스터디 플래너</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      /* 요청하신 10가지 프리미엄 색상 팔레트 */
      --rose:        #C4958A;
      --mocha:       #B5A898;
      --sage:        #9DB49A;
      --steel:       #8E9DB8;
      --slate:       #A0A8B0;
      --dusty-pink:  #C9A0A0;
      --olive:       #A8A87A;
      --lavender:    #A89EC0;
      --terracotta:  #C09878;
      --teal:        #7AABAA;

      --bg:          #F7F4F0;
      --surface:     #FFFFFF;
      --border:      #E5E0D8;
      --text:        #3D3630;
      --text-sub:    #7A7068;
      --text-light:  #AAA298;
      --accent:      #8E9DB8;
      --shadow:      rgba(80,60,40,0.08);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Login Screen ── */
    #login-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 20px;
      background: linear-gradient(135deg, #f0ebe4 0%, #e8e2d8 100%);
    }
    .login-card {
      background: var(--surface);
      border-radius: 24px;
      padding: 40px 36px;
      box-shadow: 0 8px 32px var(--shadow);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      width: 340px;
    }
    .login-emoji { font-size: 52px; }
    .login-card h1 { font-family:'Gowun Dodum',serif; font-size:22px; color:var(--text); }
    .login-card p  { font-size:13px; color:var(--text-sub); text-align:center; line-height:1.6; }
    .login-input {
      width:100%; padding:12px 16px; border:1.5px solid var(--border);
      border-radius:12px; font-size:15px; font-family:inherit; outline:none;
      transition: border-color .2s;
    }
    .login-input:focus { border-color: var(--accent); }
    .login-btn {
      width:100%; padding:13px; background:var(--accent); color:#fff;
      border:none; border-radius:12px; font-size:15px; font-family:inherit;
      cursor:pointer; font-weight:500; transition: opacity .2s;
    }
    .login-btn:hover { opacity:.88; }

    /* ── Layout ── */
    #app { display:none; flex-direction:column; min-height:100vh; }

    header {
      background: var(--surface);
      border-bottom: 1.5px solid var(--border);
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-left { display:flex; align-items:center; gap:10px; }
    .header-logo { font-family:'Gowun Dodum',serif; font-size:17px; color:var(--text); }
    .header-user {
      font-size:12px; color:var(--text-sub);
      background:var(--bg); padding:4px 10px; border-radius:20px;
    }
    .header-actions { display:flex; gap:8px; align-items:center; }
    .status-dot {
      width:8px; height:8px; border-radius:50%; background:#ccc;
      transition: background .3s;
    }
    .status-dot.connected { background: var(--sage); }

    .btn-sm {
      padding:6px 12px; border-radius:8px; border:1.5px solid var(--border);
      background:var(--surface); font-size:12px; font-family:inherit;
      cursor:pointer; color:var(--text); transition: all .15s;
    }
    .btn-sm:hover { background:var(--bg); border-color:var(--accent); }

    /* ── Tab Nav ── */
    .tab-nav {
      display:flex; border-bottom:1.5px solid var(--border);
      background:var(--surface); overflow-x:auto; flex-shrink:0;
    }
    .tab-btn {
      padding:10px 18px; border:none; background:none; cursor:pointer;
      font-size:13px; font-family:inherit; color:var(--text-sub);
      border-bottom:2.5px solid transparent; white-space:nowrap;
      transition: all .15s;
    }
    .tab-btn.active { color:var(--accent); border-bottom-color:var(--accent); font-weight:500; }

    /* ── Main Content ── */
    main { flex:1; overflow:auto; }
    .tab-panel { display:none; padding:20px; }
    .tab-panel.active { display:block; }

    /* ── Week Selector ── */
    .week-controls {
      display:flex; align-items:center; gap:12px; margin-bottom:20px;
      flex-wrap:wrap;
    }
    .week-controls label { font-size:13px; color:var(--text-sub); font-weight:500; }
    .select-styled {
      padding:7px 12px; border:1.5px solid var(--border); border-radius:10px;
      background:var(--surface); font-family:inherit; font-size:13px;
      color:var(--text); cursor:pointer; outline:none;
    }
    .select-styled:focus { border-color:var(--accent); }

    /* ── Planner Grid ── */
    .planner-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 12px;
    }
    .day-col {
      background: var(--surface);
      border-radius: 14px;
      border: 1.5px solid var(--border);
      overflow: hidden;
      min-width: 140px;
    }
    .day-header {
      padding: 12px;
      font-size: 13px;
      font-weight: 600;
      color: #fff;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .day-header .day-name { font-size: 14px; letter-spacing:.03em; text-shadow: 0 1px 2px rgba(0,0,0,0.1); }
    
    /* 날짜 입력칸 시인성 명확화 고정 보정 */
    .day-header .day-date-input {
      font-size: 12px;
      background: rgba(255,255,255,0.95);
      border: 1.5px solid rgba(0,0,0,0.15);
      border-radius: 6px;
      padding: 5px 8px;
      width: 100%;
      color: #3D3630;
      font-family: inherit;
      font-weight: 500;
      outline: none;
      box-shadow: inset 0 1px 2px rgba(0,0,0,0.05);
    }
    .day-header .day-date-input::placeholder { color: #AAA298; }
    .day-header .day-date-input:focus { background: #fff; border-color: rgba(0,0,0,0.3); }

    /* 하루 전체 완료율 바 UI 디자인 */
    .day-completion-bar {
      margin-top: 4px;
      padding: 6px 8px;
      background: rgba(0,0,0,0.15);
      border-radius: 8px;
    }
    .day-completion-label {
      display:flex; justify-content:space-between;
      font-size:11px; color:#ffffff; font-weight: 500; margin-bottom:4px;
    }
    .day-bar-track {
      height:5px; background:rgba(255,255,255,0.3); border-radius:3px; overflow:hidden;
    }
    .day-bar-fill {
      height:100%; background:#ffffff; border-radius:3px;
      transition: width .4s ease;
    }

    .day-slots { padding:8px; display:flex; flex-direction:column; gap:6px; min-height: 120px; }

    /* slot card */
    .slot-card {
      border-radius: 9px;
      padding: 10px;
      cursor: pointer;
      position: relative;
      transition: transform .12s, box-shadow .12s;
      min-height: 64px;
    }
    .slot-card:hover { transform:translateY(-1px); box-shadow:0 3px 10px var(--shadow); }
    .slot-card.empty {
      background: var(--bg);
      border: 1.5px dashed var(--border);
      display:flex; align-items:center; justify-content:center;
      color:var(--text-light); font-size:11px; min-height:54px;
    }
    .slot-card.has-subject {
      border: none;
      color: #fff;
    }
    .slot-card.has-event {
      background: #F5F0E8;
      border: 1.5px solid var(--border);
      color: var(--text);
    }
    .slot-card .slot-time { font-size:10px; opacity:.85; margin-bottom:3px; font-weight: 500; }
    .slot-card .slot-subject { font-size:12px; font-weight:700; line-height: 1.3; }
    .slot-card .slot-duration { font-size:10px; opacity:.8; margin-top:2px; }
    .slot-done-btn {
      position:absolute; top:8px; right:8px;
      width:20px; height:20px; border-radius:50%;
      border:1.5px solid rgba(255,255,255,0.7);
      background:transparent; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      font-size:11px; color:rgba(255,255,255,0.9);
      transition: all .15s;
    }
    .slot-done-btn.done { background:rgba(255,255,255,1); color:#3D3630; font-weight: bold; }
    .slot-card.has-event .slot-done-btn {
      border-color: var(--text-light); color: var(--text-sub);
    }
    .slot-card.has-event .slot-done-btn.done { background:#9DB49A; color:#fff; border-color:#9DB49A; }

    .add-slot-btn {
      margin:0 8px 8px; padding:8px;
      border:1.5px dashed var(--border); border-radius:9px;
      background:none; cursor:pointer; width:calc(100% - 16px);
      font-size:11px; color:var(--text-sub); font-family:inherit; font-weight: 500;
      transition: all .15s;
    }
    .add-slot-btn:hover { border-color:var(--accent); color:var(--accent); background:rgba(142,157,184,.06); }

    /* ── Modal ── */
    .modal-overlay {
      display:none; position:fixed; inset:0;
      background:rgba(60,50,40,0.45); backdrop-filter:blur(4px);
      z-index:200; align-items:center; justify-content:center;
    }
    .modal-overlay.open { display:flex; }
    .modal {
      background:var(--surface); border-radius:20px;
      padding:28px 24px; width:340px; max-width:92vw;
      box-shadow:0 20px 60px rgba(0,0,0,0.15);
      animation: modalIn .2s ease;
    }
    @keyframes modalIn { from{transform:scale(.95);opacity:0} to{transform:scale(1);opacity:1} }
    .modal h3 { font-size:16px; margin-bottom:18px; color:var(--text); }
    .modal-field { margin-bottom:14px; }
    .modal-field label { display:block; font-size:12px; color:var(--text-sub); margin-bottom:5px; font-weight:500; }
    .modal-field input,
    .modal-field select,
    .modal-field textarea {
      width:100%; padding:9px 12px;
      border:1.5px solid var(--border); border-radius:10px;
      font-family:inherit; font-size:14px; color:var(--text);
      background:var(--bg); outline:none; transition:border-color .2s;
    }
    .modal-field input:focus,
    .modal-field select:focus,
    .modal-field textarea:focus { border-color:var(--accent); }
    .modal-actions { display:flex; gap:8px; margin-top:20px; }
    .btn-cancel {
      flex:1; padding:10px; border:1.5px solid var(--border);
      border-radius:10px; background:none; font-family:inherit;
      font-size:14px; cursor:pointer; color:var(--text-sub);
    }
    .btn-confirm {
      flex:1; padding:10px; background:var(--accent); color:#fff;
      border:none; border-radius:10px; font-family:inherit;
      font-size:14px; cursor:pointer; font-weight:500;
    }
    .btn-danger {
      flex:1; padding:10px; background:#e87070; color:#fff;
      border:none; border-radius:10px; font-family:inherit;
      font-size:14px; cursor:pointer;
    }
    .subject-chips {
      display:flex; flex-wrap:wrap; gap:6px; margin-bottom:8px;
    }
    .subject-chip {
      padding:6px 12px; border-radius:20px; font-size:12px;
      cursor:pointer; border:2px solid transparent; color:#fff; font-weight: 500;
      transition: transform .1s, box-shadow .1s;
    }
    .subject-chip:hover { transform:scale(1.04); box-shadow:0 2px 8px var(--shadow); }
    .subject-chip.selected { border-color:#3D3630; box-shadow:0 2px 12px var(--shadow); transform: scale(1.02); }
    .type-tabs { display:flex; gap:6px; margin-bottom:14px; }
    .type-tab {
      flex:1; padding:8px; border-radius:8px; border:1.5px solid var(--border);
      background:none; font-family:inherit; font-size:13px; cursor:pointer;
      color:var(--text-sub); font-weight: 500; transition:all .15s;
    }
    .type-tab.active { background:var(--accent); color:#fff; border-color:var(--accent); }

    /* ── Subject Manager ── */
    .subject-list { display:flex; flex-direction:column; gap:8px; margin-bottom:16px; }
    .subject-item {
      display:flex; align-items:center; gap:10px; padding:10px 12px;
      background:var(--bg); border-radius:10px; border:1.5px solid var(--border);
    }
    .subject-color-dot { width:14px; height:14px; border-radius:50%; flex-shrink:0; }
    .subject-name { flex:1; font-size:14px; font-weight: 500; }
    .subject-goal { font-size:11px; color:var(--text-sub); margin-right: 4px; }
    .btn-icon {
      width:28px; height:28px; border-radius:8px; border:none;
      background:none; cursor:pointer; font-size:13px; color:var(--text-sub);
      transition:background .15s;
    }
    .btn-icon:hover { background:var(--border); }
    .add-subject-row {
      display:flex; gap:8px;
    }
    .add-subject-row input {
      flex:1; padding:8px 12px; border:1.5px solid var(--border);
      border-radius:10px; font-family:inherit; font-size:13px; outline:none;
    }
    .add-subject-row input:focus { border-color:var(--accent); }
    .color-picker-row { display:flex; gap:8px; flex-wrap:wrap; margin:8px 0; }
    .color-swatch {
      width:26px; height:26px; border-radius:50%; cursor:pointer;
      border:2px solid transparent; transition:transform .1s;
    }
    .color-swatch:hover { transform:scale(1.15); }
    .color-swatch.selected { border-color:var(--text); transform: scale(1.1); }

    /* ── Stats ── */
    .stats-section { margin-bottom:28px; }
    .stats-section h3 { font-size:16px; font-weight:600; margin-bottom:14px; color:var(--text); }
    .stats-container { display: flex; flex-direction: column; gap: 20px; }
    
    /* 비중 통계 표 UI 개편 */
    .stats-card-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .stats-row-item {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
    }
    .stats-row-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .stats-row-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 700;
    }
    .stats-row-meta {
      font-size: 12px;
      color: var(--text-sub);
    }
    .stats-progress-container {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .stats-progress-track {
      flex: 1;
      height: 10px;
      background: var(--bg);
      border-radius: 5px;
      overflow: hidden;
    }
    .stats-progress-fill {
      height: 100%;
      border-radius: 5px;
      transition: width 0.5s ease;
    }
    .stats-percent-text {
      font-size: 13px;
      font-weight: 700;
      width: 45px;
      text-align: right;
    }

    /* ── Toast ── */
    #toast {
      position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(20px);
      background:var(--text); color:#fff; padding:10px 18px; border-radius:12px;
      font-size:13px; opacity:0; transition:all .25s; z-index:999; pointer-events:none;
    }
    #toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

    /* ── Responsive ── */
    @media(max-width:1024px){
      .planner-grid { grid-template-columns:repeat(4,1fr); }
    }
    @media(max-width:768px){
      .planner-grid { grid-template-columns:repeat(2,1fr); }
      .tab-btn { padding:10px 12px; font-size:12px; }
    }
    @media(max-width:480px){
      .planner-grid { grid-template-columns:1fr; }
    }
  </style>
</head>
<body>

<!-- ── Login ── -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-emoji">📖</div>
    <h1>주간 스터디 플래너</h1>
    <p>닉네임으로 어디서든 동기화<br>같은 닉네임으로 이어서 쓸 수 있어요</p>
    <input id="nickname-input" class="login-input" type="text" placeholder="닉네임 입력" maxlength="20" />
    <button class="login-btn" onclick="startApp()">시작하기</button>
  </div>
</div>

<!-- ── App ── -->
<div id="app">
  <header>
    <div class="header-left">
      <span class="header-logo">📖 스터디 플래너</span>
      <span class="header-user" id="header-user"></span>
    </div>
    <div class="header-actions">
      <div class="status-dot" id="status-dot" title="연결 상태"></div>
      <button class="btn-sm" onclick="saveData()">💾 저장</button>
      <button class="btn-sm" onclick="window.print()">🖨️ 출력</button>
      <button class="btn-sm" onclick="logout()">로그아웃</button>
    </div>
  </header>

  <nav class="tab-nav">
    <button class="tab-btn active" onclick="switchTab('planner',this)">📅 플래너</button>
    <button class="tab-btn" onclick="switchTab('progress',this)">📊 진도관리</button>
    <button class="tab-btn" onclick="switchTab('stats',this)">📈 성취통계</button>
    <button class="tab-btn" onclick="switchTab('subjects',this)">📚 과목정의</button>
  </nav>

  <main>
    <!-- ── Planner Tab ── -->
    <div id="tab-planner" class="tab-panel active">
      <div class="week-controls">
        <label>월</label>
        <select id="sel-month" class="select-styled" onchange="onWeekChange()"></select>
        <label>주차</label>
        <select id="sel-week" class="select-styled" onchange="onWeekChange()"></select>
        <span id="week-range-label" style="font-size:12px;color:var(--text-sub)"></span>
      </div>
      <div class="planner-grid" id="planner-grid"></div>
    </div>

    <!-- ── Progress Tab ── -->
    <div id="tab-progress" class="tab-panel">
      <div class="week-controls">
        <label>월</label>
        <select id="prog-month" class="select-styled" onchange="renderProgress()"></select>
        <label>주차</label>
        <select id="prog-week" class="select-styled" onchange="renderProgress()"></select>
      </div>
      <div id="progress-content"></div>
    </div>

    <!-- ── Stats Tab ── -->
    <div id="tab-stats" class="tab-panel">
      <div class="week-controls">
        <label>통계 기간</label>
        <select id="stats-period" class="select-styled" onchange="renderStats()">
          <option value="week">이번 주 데이터 분석</option>
          <option value="month">이번 달 누적 데이터 분석</option>
        </select>
      </div>
      <div id="stats-content"></div>
    </div>

    <!-- ── Subjects Tab ── -->
    <div id="tab-subjects" class="tab-panel">
      <div class="stats-section">
        <h3>📚 기본 과목 설정 및 색상 임의 배정</h3>
        <div id="subject-list-ui" class="subject-list"></div>
        <div class="add-subject-row">
          <button class="btn-confirm" onclick="openAddSubjectModal()">+ 새 과목 등록하기</button>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- ── Slot Edit/Add Modal ── -->
<div class="modal-overlay" id="slot-modal">
  <div class="modal">
    <h3 id="slot-modal-title">일정 편집</h3>
    <div class="type-tabs">
      <button class="type-tab active" id="type-study" onclick="setSlotType('study')">📚 공부</button>
      <button class="type-tab" id="type-event" onclick="setSlotType('event')">📌 일반 일정</button>
    </div>
    
    <div id="study-fields">
      <div class="modal-field">
        <label>과목 선택</label>
        <div class="subject-chips" id="modal-subject-chips"></div>
      </div>
      <div class="modal-field">
        <label>목표 시간 설정 (30분 단위)</label>
        <div style="display:flex;gap:8px;">
          <select id="modal-time-start" class="select-styled" style="flex:1"></select>
          <span style="align-self:center;color:var(--text-sub)">~</span>
          <select id="modal-time-end" class="select-styled" style="flex:1"></select>
        </div>
      </div>
      <div class="modal-field">
        <label>세부 공부 메모</label>
        <textarea id="modal-memo" rows="2" placeholder="공부 범위나 내용을 입력하세요."></textarea>
      </div>
    </div>

    <div id="event-fields" style="display:none">
      <div class="modal-field">
        <label>일정 분류 명칭</label>
        <input id="modal-event-name" placeholder="예) 저녁식사, 알바, 휴식 등" />
      </div>
      <div class="modal-field">
        <label>시간 설정 (30분 단위)</label>
        <div style="display:flex;gap:8px;">
          <select id="modal-event-start" class="select-styled" style="flex:1"></select>
          <span style="align-self:center;color:var(--text-sub)">~</span>
          <select id="modal-event-end" class="select-styled" style="flex:1"></select>
        </div>
      </div>
      <div class="modal-field">
        <label>일정 메모</label>
        <textarea id="modal-event-memo" rows="2" placeholder="선택 입력 사항"></textarea>
      </div>
    </div>

    <div class="modal-actions">
      <button class="btn-danger" id="btn-delete-slot" onclick="deleteSlot()">삭제</button>
      <button class="btn-cancel" onclick="closeSlotModal()">취소</button>
      <button class="btn-confirm" onclick="saveSlot()">확인</button>
    </div>
  </div>
</div>

<!-- ── Add/Edit Subject Modal ── -->
<div class="modal-overlay" id="subject-modal">
  <div class="modal">
    <h3 id="subject-modal-title">📚 과목 추가/편집</h3>
    <div class="modal-field">
      <label>과목명</label>
      <input id="subj-name" placeholder="예) 수학, 영어, 자격증" />
    </div>
    <div class="modal-field">
      <label>지정 색상 고르기</label>
      <div class="color-picker-row" id="color-picker-row"></div>
    </div>
    <div class="modal-field">
      <label>주간 목표 시간 (단위: 시간)</label>
      <input id="subj-goal" type="number" min="0" max="100" step="0.5" placeholder="예) 5" />
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeSubjectModal()">취소</button>
      <button class="btn-confirm" onclick="saveSubject()">저장</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const SUPABASE_URL = 'https://gbjlroojsweedundumfi.supabase.co';
const SUPABASE_KEY = 'sb_publishable_VRGqUrURUfbtW63olLBNhw_VtdKKIFN';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

// 요청에 맞춰 통일 배치한 10가지 프리미엄 칼라 세트
const PALETTE = [
  { name:'Rose',        hex:'#C4958A' },
  { name:'Mocha',       hex:'#B5A898' },
  { name:'Sage',        hex:'#9DB49A' },
  { name:'Steel Blue',  hex:'#8E9DB8' },
  { name:'Slate',       hex:'#A0A8B0' },
  { name:'Dusty Pink',  hex:'#C9A0A0' },
  { name:'Olive',       hex:'#A8A87A' },
  { name:'Lavender',    hex:'#A89EC0' },
  { name:'Terracotta',  hex:'#C09878' },
  { name:'Teal',        hex:'#7AABAA' },
];

// 요일별 기존 고유 배경 헤더 색상 유지 보존
const DAY_COLORS = {
  '월': '#C4958A', '화': '#9DB49A', '수': '#8E9DB8',
  '목': '#A89EC0', '금': '#C09878', '토': '#7AABAA', '일': '#C9A0A0'
};
const DAYS = ['월','화','수','목','금','토','일'];

let userId = '';
let appData = { subjects: [], weeks: {} };
let currentWeekKey = '';
let editingSlot = null;
let slotModalDayIdx = 0;
let slotType = 'study';
let editingSubjectId = null;
let selectedSubjectId = null;
let selectedColor = PALETTE[0].hex;

// 초기 더미 과목 자동 생성 시 10가지 팔레트 색상 임의 순차 배정용 변수
function initDefaultSubjects() {
  if (!appData.subjects || appData.subjects.length === 0) {
    appData.subjects = [
      { id: 'sub-1', name: '국어', color: PALETTE[0].hex, goal: 5 },
      { id: 'sub-2', name: '수학', color: PALETTE[3].hex, goal: 8 },
      { id: 'sub-3', name: '영어', color: PALETTE[7].hex, goal: 4 }
    ];
  }
}

// 30분 단위 시각 옵션 어레이 생성기
function timeOptions() {
  const opts = [];
  for (let h = 0; h < 24; h++) {
    for (let m = 0; m < 60; m += 30) {
      opts.push(`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`);
    }
  }
  return opts;
}

function populateTimeSelect(sel, defaultVal) {
  sel.innerHTML = '';
  timeOptions().forEach(t => {
    const o = document.createElement('option');
    o.value = t; o.textContent = t;
    sel.appendChild(o);
  });
  if (defaultVal) sel.value = defaultVal;
}

function minutesBetween(t1, t2) {
  const [h1,m1] = t1.split(':').map(Number);
  const [h2,m2] = t2.split(':').map(Number);
  return (h2*60+m2) - (h1*60+m1);
}

function formatDuration(mins) {
  if (mins <= 0) return '';
  const h = Math.floor(mins/60), m = mins%60;
  if (h && m) return `${h}시간 ${m}분`;
  if (h) return `${h}시간`;
  return `${m}분`;
}

function weekKey(month, week) { return `${new Date().getFullYear()}-${String(month).padStart(2,'0')}-W${week}`; }
function getCurrentWeekKey() {
  const now = new Date();
  return weekKey(now.getMonth()+1, Math.ceil(now.getDate()/7));
}

function ensureWeek(key) {
  if (!appData.weeks[key]) appData.weeks[key] = { dates:['','','','','','',''], slots:[] };
}
function getWeek() { ensureWeek(currentWeekKey); return appData.weeks[currentWeekKey]; }

function startApp() {
  const name = document.getElementById('nickname-input').value.trim();
  if (!name) { showToast('닉네임을 입력해주세요'); return; }
  userId = name;
  document.getElementById('header-user').textContent = `👤 ${name}`;
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  initSelectors();
  loadData();
}
document.getElementById('nickname-input').addEventListener('keydown', e => { if(e.key==='Enter') startApp(); });

function logout() {
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  userId = '';
  appData = { subjects:[], weeks:{} };
}

async function loadData() {
  try {
    const { data, error } = await db.from('planner_data')
      .select('*').eq('user_id', userId).order('created_at', { ascending:false }).limit(1);
    if (!error && data && data.length) {
      appData = JSON.parse(data[0].content);
      if (!appData.subjects) appData.subjects = [];
      if (!appData.weeks) appData.weeks = {};
    }
    initDefaultSubjects();
    setConnected(true);
  } catch(e) { 
    initDefaultSubjects();
    setConnected(false); 
  }
  renderAll();
}

async function saveData() {
  try {
    const { error } = await db.from('planner_data').upsert({
      user_id: userId,
      week_key: currentWeekKey,
      content: JSON.stringify(appData),
      created_at: new Date().toISOString()
    }, { onConflict: 'user_id' });
    if (!error) { showToast('저장 완료 ✓'); setConnected(true); }
    else throw error;
  } catch(e) { showToast('저장 실패 — 네트워크 확인'); setConnected(false); }
}

function setConnected(v) {
  const dot = document.getElementById('status-dot');
  dot.classList.toggle('connected', v);
  dot.title = v ? '연결됨' : '연결 실패';
}

function initSelectors() {
  const months = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  ['sel-month','prog-month'].forEach(id => {
    const s = document.getElementById(id);
    s.innerHTML = months.map((m,i) => `<option value="${i+1}">${m}</option>`).join('');
    s.value = new Date().getMonth()+1;
  });
  ['sel-week','prog-week'].forEach(id => {
    const s = document.getElementById(id);
    s.innerHTML = [1,2,3,4,5].map(w => `<option value="${w}">${w}주차</option>`).join('');
    s.value = Math.ceil(new Date().getDate()/7);
  });
  currentWeekKey = getCurrentWeekKey();
  updateWeekLabel();
}

function onWeekChange() {
  const m = +document.getElementById('sel-month').value;
  const w = +document.getElementById('sel-week').value;
  currentWeekKey = weekKey(m, w);
  updateWeekLabel();
  renderPlanner();
}

function updateWeekLabel() {
  const parts = currentWeekKey.split(/[-W]/);
  const y = +parts[0], mo = +parts[1], wn = +parts[3];
  const firstDay = new Date(y, mo-1, 1);
  const dow = firstDay.getDay() || 7;
  const monday = new Date(firstDay);
  monday.setDate(1 - (dow-1) + (wn-1)*7);
  const sunday = new Date(monday); sunday.setDate(monday.getDate()+6);
  const fmt = d => `${d.getMonth()+1}/${d.getDate()}`;
  document.getElementById('week-range-label').textContent = `(${fmt(monday)} ~ ${fmt(sunday)})`;
  const week = getWeek();
  DAYS.forEach((_, i) => {
    if (!week.dates[i]) {
      const d = new Date(monday); d.setDate(monday.getDate()+i);
      week.dates[i] = `${d.getMonth()+1}/${d.getDate()}`;
    }
  });
}

function renderAll() { renderPlanner(); renderSubjectList(); renderProgress(); renderStats(); }

function renderPlanner() {
  const week = getWeek();
  const grid = document.getElementById('planner-grid');
  grid.innerHTML = '';
  DAYS.forEach((day, i) => {
    const col = document.createElement('div');
    col.className = 'day-col';
    const slots = week.slots.filter(s => s.dayIdx === i);
    
    // 하루 전체 목표 대상 완료율 계산 (공부 및 일반일정 전체 총합 반영)
    const total = slots.length;
    const done  = slots.filter(s => s.done).length;
    const pct   = total > 0 ? Math.round((done / total) * 100) : 0;
    
    col.innerHTML = `
      <div class="day-header" style="background:${DAY_COLORS[day]}">
        <div class="day-name">${day}요일</div>
        <input class="day-date-input" type="text"
          placeholder="날짜 (예: 5/20)"
          value="${week.dates[i]||''}"
          onchange="setDate(${i},this.value)"
        />
        <div class="day-completion-bar">
          <div class="day-completion-label"><span>하루완료율</span><span>${pct}%</span></div>
          <div class="day-bar-track"><div class="day-bar-fill" style="width:${pct}%"></div></div>
        </div>
      </div>
      <div class="day-slots" id="slots-${i}"></div>
      <button class="add-slot-btn" onclick="openSlotModal(${i},null)">+ 일정 추가</button>
    `;
    grid.appendChild(col);
    const slotsEl = col.querySelector(`#slots-${i}`);
    if (!slots.length) {
      slotsEl.innerHTML = `<div class="slot-card empty">계획이 없습니다</div>`;
    } else {
      slots.sort((a,b)=>a.startTime.localeCompare(b.startTime));
      slots.forEach(slot => slotsEl.appendChild(buildSlotCard(slot,i)));
    }
  });
}

function buildSlotCard(slot, dayIdx) {
  const card = document.createElement('div');
  const dur = minutesBetween(slot.startTime, slot.endTime);
  if (slot.type === 'event') {
    card.className = 'slot-card has-event';
    card.innerHTML = `
      <div class="slot-time">⏱️ ${slot.startTime} ~ ${slot.endTime}</div>
      <div class="slot-subject">📌 ${slot.eventName||'일정'}</div>
      ${dur>0?`<div class="slot-duration">${formatDuration(dur)}</div>`:''}
      ${slot.memo?`<div class="slot-duration" style="margin-top:3px;font-style:italic;color:var(--text-sub)">${slot.memo}</div>`:''}
      <button class="slot-done-btn${slot.done?' done':''}" onclick="toggleDone(event,${dayIdx},'${slot.id}')">${slot.done?'✓':'○'}</button>
    `;
  } else {
    const subj = appData.subjects.find(s=>s.id===slot.subjectId);
    const color = subj ? subj.color : '#A0A8B0';
    card.className = 'slot-card has-subject';
    card.style.background = color;
    card.innerHTML = `
      <div class="slot-time">${slot.startTime} ~ ${slot.endTime}</div>
      <div class="slot-subject">${subj?subj.name:'미지정 과목'}</div>
      ${dur>0?`<div class="slot-duration">${formatDuration(dur)}</div>`:''}
      ${slot.memo?`<div class="slot-duration" style="margin-top:3px;font-style:italic;color:rgba(255,255,255,0.9)">${slot.memo}</div>`:''}
      <button class="slot-done-btn${slot.done?' done':''}" onclick="toggleDone(event,${dayIdx},'${slot.id}')">${slot.done?'✓':'○'}</button>
    `;
  }
  card.addEventListener('click', (e)=>{
    if(e.target.classList.contains('slot-done-btn')) return;
    openSlotModal(dayIdx,slot.id);
  });
  return card;
}

function setDate(dayIdx, val) { getWeek().dates[dayIdx] = val; }

function toggleDone(e, dayIdx, slotId) {
  e.stopPropagation();
  const slot = getWeek().slots.find(s=>s.id===slotId);
  if (slot) { slot.done = !slot.done; renderPlanner(); renderProgress(); renderStats(); }
}

function openSlotModal(dayIdx, slotId) {
  slotModalDayIdx = dayIdx;
  editingSlot = slotId;
  const slot = slotId ? getWeek().slots.find(s=>s.id===slotId) : null;
  
  document.getElementById('slot-modal-title').textContent = slot ? '일정 수정/관리' : (DAYS[dayIdx]+'요일 새로운 계획 등록');
  
  populateTimeSelect(document.getElementById('modal-time-start'), '09:00');
  populateTimeSelect(document.getElementById('modal-time-end'), '10:00');
  populateTimeSelect(document.getElementById('modal-event-start'), '18:00');
  populateTimeSelect(document.getElementById('modal-event-end'), '19:00');
  
  renderModalSubjectChips();

  if (slot) {
    setSlotType(slot.type || 'study');
    document.getElementById('btn-delete-slot').style.display = 'block';
    if (slot.type === 'event') {
      document.getElementById('modal-event-name').value = slot.eventName || '';
      document.getElementById('modal-event-start').value = slot.startTime || '18:00';
      document.getElementById('modal-event-end').value = slot.endTime || '19:00';
      document.getElementById('modal-event-memo').value = slot.memo || '';
    } else {
      selectedSubjectId = slot.subjectId || null;
      document.getElementById('modal-time-start').value = slot.startTime || '09:00';
      document.getElementById('modal-time-end').value = slot.endTime || '10:00';
      document.getElementById('modal-memo').value = slot.memo || '';
      renderModalSubjectChips();
    }
  } else {
    setSlotType('study');
    document.getElementById('btn-delete-slot').style.display = 'none';
    document.getElementById('modal-event-name').value = '';
    document.getElementById('modal-event-memo').value = '';
    document.getElementById('modal-memo').value = '';
    selectedSubjectId = appData.subjects.length > 0 ? appData.subjects[0].id : null;
    renderModalSubjectChips();
  }
  
  document.getElementById('slot-modal').classList.add('open');
}

function closeSlotModal() { document.getElementById('slot-modal').classList.remove('open'); }

function setSlotType(type) {
  slotType = type;
  document.getElementById('type-study').classList.toggle('active', type === 'study');
  document.getElementById('type-event').classList.toggle('active', type === 'event');
  document.getElementById('study-fields').style.display = type === 'study' ? 'block' : 'none';
  document.getElementById('event-fields').style.display = type === 'event' ? 'block' : 'none';
}

function renderModalSubjectChips() {
  const container = document.getElementById('modal-subject-chips');
  container.innerHTML = '';
  if(appData.subjects.length === 0){
    container.innerHTML = '<span style="font-size:12px;color:var(--text-sub)">등록된 과목이 없습니다. 과목정의 탭에서 추가하세요.</span>';
    return;
  }
  appData.subjects.forEach(s => {
    const chip = document.createElement('div');
    chip.className = `subject-chip ${selectedSubjectId === s.id ? 'selected' : ''}`;
    chip.style.backgroundColor = s.color;
    chip.textContent = s.name;
    chip.onclick = () => {
      selectedSubjectId = s.id;
      renderModalSubjectChips();
    };
    container.appendChild(chip);
  });
}

function saveSlot() {
  const week = getWeek();
  let start = '', end = '', memo = '', eventName = '';
  
  if (slotType === 'study') {
    if (!selectedSubjectId) { showToast('과목을 선택해주세요'); return; }
    start = document.getElementById('modal-time-start').value;
    end = document.getElementById('modal-time-end').value;
    memo = document.getElementById('modal-memo').value.trim();
    if(minutesBetween(start, end) <= 0) { showToast('종료 시간이 시작 시간보다 빨라요!'); return; }
  } else {
    eventName = document.getElementById('modal-event-name').value.trim();
    if (!eventName) { showToast('일정 이름을 입력하세요(예: 알바)'); return; }
    start = document.getElementById('modal-event-start').value;
    end = document.getElementById('modal-event-end').value;
    memo = document.getElementById('modal-event-memo').value.trim();
    if(minutesBetween(start, end) <= 0) { showToast('종료 시간이 시작 시간보다 빨라요!'); return; }
  }

  if (editingSlot) {
    const existing = week.slots.find(s => s.id === editingSlot);
    if (existing) {
      existing.type = slotType;
      existing.startTime = start;
      existing.endTime = end;
      existing.memo = memo;
      existing.subjectId = slotType === 'study' ? selectedSubjectId : null;
      existing.eventName = slotType === 'event' ? eventName : null;
    }
  } else {
    const newSlot = {
      id: 'slot_' + Date.now() + '_' + Math.random().toString(36).substr(2, 4),
      dayIdx: slotModalDayIdx,
      type: slotType,
      startTime: start,
      endTime: end,
      memo: memo,
      subjectId: slotType === 'study' ? selectedSubjectId : null,
      eventName: slotType === 'event' ? eventName : null,
      done: false
    };
    week.slots.push(newSlot);
  }
  
  closeSlotModal();
  renderAll();
}

function deleteSlot() {
  if (!editingSlot) return;
  const week = getWeek();
  week.slots = week.slots.filter(s => s.id !== editingSlot);
  closeSlotModal();
  renderAll();
}

/* ── 과목 정의 및 통배합 10개 색상 선택 ── */
function renderSubjectList() {
  const container = document.getElementById('subject-list-ui');
  container.innerHTML = '';
  if(appData.subjects.length === 0){
    container.innerHTML = '<p style="font-size:13px;color:var(--text-light);padding:10px;">등록된 과목이 없습니다.</p>';
    return;
  }
  appData.subjects.forEach(s => {
    const div = document.createElement('div');
    div.className = 'subject-item';
    div.innerHTML = `
      <div class="subject-color-dot" style="background:${s.color}"></div>
      <div class="subject-name">${s.name}</div>
      <div class="subject-goal">목표: 주간 ${s.goal||0}시간</div>
      <button class="btn-icon" onclick="openEditSubjectModal('${s.id}')">✏️</button>
      <button class="btn-icon" onclick="deleteSubject('${s.id}')">❌</button>
    `;
    container.appendChild(div);
  });
}

function openAddSubjectModal() {
  editingSubjectId = null;
  document.getElementById('subject-modal-title').textContent = '📚 새 과목 등록';
  document.getElementById('subj-name').value = '';
  document.getElementById('subj-goal').value = '';
  // 임의 색상 미리 하나 배정
  const randColor = PALETTE[Math.floor(Math.random() * PALETTE.length)].hex;
  selectedColor = randColor;
  renderColorSwatches();
  document.getElementById('subject-modal').classList.add('open');
}

function openEditSubjectModal(id) {
  editingSubjectId = id;
  const s = appData.subjects.find(sub => sub.id === id);
  if(!s) return;
  document.getElementById('subject-modal-title').textContent = '📚 과목 편집';
  document.getElementById('subj-name').value = s.name;
  document.getElementById('subj-goal').value = s.goal || '';
  selectedColor = s.color;
  renderColorSwatches();
  document.getElementById('subject-modal').classList.add('open');
}

function closeSubjectModal() { document.getElementById('subject-modal').classList.remove('open'); }

function renderColorSwatches() {
  const row = document.getElementById('color-picker-row');
  row.innerHTML = '';
  PALETTE.forEach(p => {
    const s = document.createElement('div');
    s.className = `color-swatch ${selectedColor === p.hex ? 'selected' : ''}`;
    s.style.backgroundColor = p.hex;
    s.title = p.name;
    s.onclick = () => {
      selectedColor = p.hex;
      renderColorSwatches();
    };
    row.appendChild(s);
  });
}

function saveSubject() {
  const name = document.getElementById('subj-name').value.trim();
  const goal = parseFloat(document.getElementById('subj-goal').value) || 0;
  if (!name) { showToast('과목명을 정확히 기입해주세요.'); return; }

  if (editingSubjectId) {
    const s = appData.subjects.find(sub => sub.id === editingSubjectId);
    if(s) { s.name = name; s.color = selectedColor; s.goal = goal; }
  } else {
    appData.subjects.push({
      id: 'sub_' + Date.now(),
      name: name,
      color: selectedColor,
      goal: goal
    });
  }
  closeSubjectModal();
  renderAll();
}

function deleteSubject(id) {
  if(confirm('이 과목을 삭제하시겠습니까? 기존 등록된 공부 일정의 색상이 초기화될 수 있습니다.')) {
    appData.subjects = appData.subjects.filter(s => s.id !== id);
    renderAll();
  }
}

/* ── Progress Tab 진도 관리 ── */
function renderProgress() {
  const container = document.getElementById('progress-content');
  container.innerHTML = '';
  const week = getWeek();
  
  let html = `<div class="stats-section"><h3>📊 이번 주차 요일별 성취 현황</h3><div class="stats-card-list">`;
  
  DAYS.forEach((day, i) => {
    const slots = week.slots.filter(s => s.dayIdx === i);
    const total = slots.length;
    const done = slots.filter(s => s.done).length;
    const pct = total > 0 ? Math.round((done / total) * 100) : 0;
    
    // 이번 주 공부 합산 타임 계산
    const studyMins = slots.filter(s=>s.type==='study' && s.done).reduce((acc,s)=>acc+minutesBetween(s.startTime,s.endTime),0);
    
    html += `
      <div class="stats-row-item">
        <div class="stats-row-header">
          <div class="stats-row-title" style="color:${DAY_COLORS[day]}">● ${day}요일 (${week.dates[i]||'날짜미정'})</div>
          <div class="stats-row-meta">완료 ${done}/${total}개 ${studyMins > 0 ? `(공부: ${formatDuration(studyMins)})` : ''}</div>
        </div>
        <div class="stats-progress-container">
          <div class="stats-progress-track">
            <div class="stats-progress-fill" style="width:${pct}%; background:${DAY_COLORS[day]};"></div>
          </div>
          <div class="stats-percent-text">${pct}%</div>
        </div>
      </div>
    `;
  });
  
  html += `</div></div>`;
  container.innerHTML = html;
}

/* ── 과목별 주별/월별 비중 통계 핵심 구현 부 ── */
function renderStats() {
  const container = document.getElementById('stats-content');
  container.innerHTML = '';
  
  const period = document.getElementById('stats-period').value; // 'week' or 'month'
  let targetSlots = [];
  
  if (period === 'week') {
    // 이번주차만 수집
    targetSlots = getWeek().slots.filter(s => s.type === 'study' && s.done);
  } else {
    // 이번달에 해당하는 모든 주차 데이터 통합 수집
    const currentMonthPrefix = currentWeekKey.substring(0, 8); // e.g., "2026-05-"
    Object.keys(appData.weeks).forEach(wKey => {
      if(wKey.startsWith(currentMonthPrefix)) {
        const slots = appData.weeks[wKey].slots || [];
        slots.forEach(s => {
          if(s.type === 'study' && s.done) targetSlots.push(s);
        });
      }
    });
  }

  // 과목별 완료 공부 시간(분) 합산
  const subMap = {};
  let totalStudyMins = 0;
  
  appData.subjects.forEach(s => { subMap[s.id] = 0; });
  
  targetSlots.forEach(s => {
    const d = minutesBetween(s.startTime, s.endTime);
    if (d > 0 && subMap[s.subjectId] !== undefined) {
      subMap[s.subjectId] += d;
      totalStudyMins += d;
    }
  });

  let html = `
    <div class="stats-section">
      <h3>📈 과목별 실 공부 비중 분석 (${period === 'week' ? '주간 통계' : '월간 누적'})</h3>
      <p style="font-size:12px; color:var(--text-sub); margin-bottom:15px;">※ 완료(✓) 처리된 공부 일정의 총 시간 비율입니다. (총 완료 시간: ${formatDuration(totalStudyMins || 0)})</p>
      <div class="stats-card-list">
  `;

  if(totalStudyMins === 0) {
    html += `<p style="font-size:13px;color:var(--text-light);padding:20px;text-align:center;">기간 내 체크 완료된 공부 데이터가 없어서 비중을 계산할 수 없습니다. 플래너에서 일정을 완료해보세요!</p>`;
  } else {
    appData.subjects.forEach(s => {
      const mins = subMap[s.id] || 0;
      const pct = totalStudyMins > 0 ? Math.round((mins / totalStudyMins) * 100) : 0;
      
      // 주간/월간 목표 시간 대비 달성도 (월간일 경우 주간목표 * 4주 기준 역산 적용)
      const targetGoalMins = period === 'week' ? (s.goal * 60) : (s.goal * 60 * 4);
      const goalPct = targetGoalMins > 0 ? Math.min(100, Math.round((mins / targetGoalMins) * 100)) : 0;

      html += `
        <div class="stats-row-item">
          <div class="stats-row-header">
            <div class="stats-row-title">
              <div class="subject-color-dot" style="background:${s.color}"></div>
              <span>${s.name}</span>
            </div>
            <div class="stats-row-meta">실공부: ${formatDuration(mins)} / 목표 달성률: ${goalPct}%</div>
          </div>
          <div class="stats-progress-container">
            <div class="stats-progress-track">
              <div class="stats-progress-fill" style="width:${pct}%; background:${s.color};"></div>
            </div>
            <div class="stats-percent-text" style="color:var(--text)">${pct}%</div>
          </div>
        </div>
      `;
    });
  }

  html += `</div></div>`;
  container.innerHTML = html;
}

/* ── 공통 유틸리티 기능 ── */
function switchTab(tabId, btn) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`tab-${tabId}`).classList.add('active');
  btn.classList.add('active');
  if(tabId === 'stats') renderStats();
  if(tabId === 'progress') renderProgress();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}
</script>
</body>
</html>
